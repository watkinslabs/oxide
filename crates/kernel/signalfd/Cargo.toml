[package]
name = "signalfd"
version = "0.1.0"
edition = "2024"
publish = false
license = "MPL-2.0"

# signalfd(2) inode per `52§3` domain layer. Drains pending signals
# off the current task into a 128-byte ssi struct on read.

[dependencies]
hal     = { path = "../../arch/hal" }
sched   = { path = "../../kernel/sched" }
sync    = { path = "../../shared/sync" }
syscall = { path = "../../kernel/syscall" }
vfs     = { path = "../../kernel/vfs" }
