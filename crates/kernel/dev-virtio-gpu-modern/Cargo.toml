[package]
name = "dev-virtio-gpu-modern"
version = "0.1.0"
edition = "2021"
publish = false
license = "MPL-2.0"

[target.'cfg(target_arch = "x86_64")'.dependencies]
hal-x86_64 = { path = "../../arch/hal-x86_64" }

[target.'cfg(target_arch = "aarch64")'.dependencies]
hal-aarch64 = { path = "../../arch/hal-aarch64" }

[dependencies]
drv-virtio-gpu = { path = "../../drivers/drv-virtio-gpu" }
fbcon          = { path = "../../drivers/fbcon" }
klog           = { path = "../../shared/klog" }
pmm            = { path = "../pmm" }
pmm-setup      = { path = "../pmm-setup" }
virtio         = { path = "../../drivers/virtio" }

[features]
default = []
debug-boot = []
