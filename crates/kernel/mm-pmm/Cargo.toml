[package]
name = "pmm"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
path = "src/lib.rs"

[dependencies]
hal      = { path = "../../arch/hal" }
klog     = { path = "../../shared/klog" }
sync     = { path = "../../shared/sync" }
bitflags = { version = "2", default-features = false }
boot-info = { path = "../../shared/boot-info" }
vmm       = { path = "../mm-vmm" }

[dev-dependencies]
proptest = "1"

[dependencies.sched]
path = "../sched"

[target.'cfg(target_arch = "x86_64")'.dependencies]
hal-x86_64 = { path = "../../arch/hal-x86_64" }

[target.'cfg(target_arch = "aarch64")'.dependencies]
hal-aarch64 = { path = "../../arch/hal-aarch64" }

[dependencies.syscall]
path = "../syscall"

[features]
default = []
debug-vmm = []
debug-irq = []
