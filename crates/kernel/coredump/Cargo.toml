[package]
name = "coredump"
version = "0.1.0"
edition = "2021"
publish = false
license = "MPL-2.0"

# Coredump on SIGSEGV/SIGABRT per `52§3` domain layer. Writes
# /core.<tid> via a tmpfs inode + devfs registration.

[dependencies]
devfs = { path = "../devfs" }
sched = { path = "../sched" }
sync  = { path = "../../shared/sync" }
tmpfs = { path = "../tmpfs" }
vfs   = { path = "../vfs" }
