[workspace]
resolver = "2"
members = ["tools/spec-lint", "tools/xtask", "kernel", "crates/arch/hal", "crates/arch/hal-x86_64", "crates/arch/hal-aarch64", "crates/shared/klog", "crates/shared/sync", "crates/shared/kalloc", "crates/arch/limine-proto", "crates/arch/boot-x86_64", "crates/arch/boot-aarch64", "crates/shared/boot-info", "crates/kernel/cpu", "crates/kernel/devfs", "crates/kernel/epoll", "crates/kernel/flock", "crates/kernel/inotify", "crates/kernel/keyring", "crates/kernel/perf", "crates/kernel/ptrace", "crates/kernel/timerfd", "crates/kernel/tmpfs", "crates/kernel/coredump", "crates/kernel/elf-load", "crates/kernel/msi", "crates/kernel/xattr", "crates/kernel/pipe", "crates/kernel/signalfd", "crates/kernel/smp", "crates/kernel/userfaultfd", "crates/arch/kernel-bin-x86_64", "crates/arch/kernel-bin-aarch64", "crates/kernel/mm-pmm", "crates/kernel/mm-pmm-setup", "crates/shared/slab", "crates/kernel/mm-vmm", "crates/kernel/sched", "crates/kernel/syscall", "crates/kernel/vfs", "crates/kernel/block", "crates/kernel/ext4", "crates/kernel/jbd2", "crates/kernel/modules", "crates/kernel/procfs", "crates/kernel/ipc", "crates/kernel/security", "crates/kernel/nscg", "crates/kernel/net", "crates/kernel/tty", "crates/kernel/iouring", "crates/shared/elf", "crates/kernel/power", "crates/kernel/firmware", "crates/drivers/pci", "crates/drivers/drv", "crates/drivers/drv-virtio-gpu", "crates/drivers/drv-virtio-input", "crates/drivers/drm", "crates/drivers/fbdev", "crates/drivers/fbcon", "crates/drivers/vt", "crates/user/obs", "crates/shared/err", "crates/shared/crc", "crates/drivers/virtio", "crates/user/dl", "crates/user/nss", "crates/shared/crypt", "crates/user/pam", "crates/user/svc", "crates/user/rpm", "crates/shared/cpio", "crates/shared/inflate", "crates/user/pkg"]

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
debug = "limited"
overflow-checks = false
incremental = false

[profile.dev]
opt-level = 1
lto = "off"
codegen-units = 16
panic = "abort"
debug = "full"
overflow-checks = true
incremental = true
