[package]
name = "kernel"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
name = "kernel"
path = "src/lib.rs"

[dependencies]
hal     = { path = "../crates/hal" }
klog    = { path = "../crates/klog" }
kalloc  = { path = "../crates/kalloc" }
pmm     = { path = "../crates/pmm" }
vmm     = { path = "../crates/vmm" }

[target.'cfg(target_arch = "x86_64")'.dependencies]
hal-x86_64 = { path = "../crates/hal-x86_64" }

[target.'cfg(target_arch = "aarch64")'.dependencies]
hal-aarch64 = { path = "../crates/hal-aarch64" }

[features]
default = []
# Per `docs/04§3` (rev R05): per-subsystem debug features. Off = call
# sites absent from the binary; the hot path emits zero bytes. Names
# match the spec's bucket list 1:1 — independence guarantee in §3.
debug-pmm  = []  # PMM smoke + stress + memmap dump
debug-vmm  = []  # device-map MMIO sanity reads (HPET cap, GICD typer)
debug-irq  = []  # LAPIC/GIC enable diag + timer-IRQ soak + tick logs
debug-acpi = []  # RSDP/XSDT walk + per-table decoder traces
debug-sched = []  # first-kthread coroutine smoke + Context::switch trace
debug-all  = ["debug-pmm","debug-vmm","debug-irq","debug-acpi","debug-sched"]

